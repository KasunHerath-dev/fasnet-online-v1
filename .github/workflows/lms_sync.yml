name: LMS Sync
on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: cd lms-sync-service && npm install
      - name: Run LMS Sync
        env:
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MAIN_BACKEND_URL: ${{ secrets.MAIN_BACKEND_URL }}
          MAIN_BACKEND_SECRET: ${{ secrets.MAIN_BACKEND_SECRET }}
          ICS_DOWNLOAD_DIR: /tmp
        run: cd lms-sync-service && node src/syncNow.js
