name: LMS Sync
on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxss1 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libfreetype6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxext6 \
            libxrender1 || true

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          cd lms-sync-service
          npm ci
          npx puppeteer browsers install chrome
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.puppeteer-cache

      - name: Run LMS Sync
        env:
          MAIN_BACKEND_URL: ${{ secrets.MAIN_BACKEND_URL }}
          MAIN_BACKEND_SECRET: ${{ secrets.MAIN_BACKEND_SECRET }}
          ICS_DOWNLOAD_DIR: /tmp
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.puppeteer-cache
        run: cd lms-sync-service && node src/syncNow.js
