services:
  # 1. Notice Scraper (Playwright) - Free Tier Web Service
  - type: web
    name: fasnet-scraper
    env: node
    rootDir: scraper
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # 2. LMS Sync Service (Puppeteer) - Free Tier Web Service
  - type: web
    name: lms-sync-service
    env: node
    rootDir: lms-sync-service
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /opt/render/project/src/.cache/puppeteer/chrome/linux-114.0.5735.133/chrome-linux64/chrome
